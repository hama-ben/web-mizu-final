services:
  - type: web
    name: mizu-landing
    runtime: node
    plan: free
    buildCommand: >-
      npm install -g pnpm@9 &&
      pnpm install --frozen-lockfile &&
      PORT=10000 BASE_PATH=/ pnpm --filter @workspace/mizu-landing build
    startCommand: pnpm --filter @workspace/mizu-landing serve
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
